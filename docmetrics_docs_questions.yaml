- question: "What does DocMetrics measure?"
  options:
    A: Code coverage across a project's test suite
    B: Documentation usefulness by comparing LLM accuracy with and without docs as context
    C: API response times for documentation endpoints
    D: The readability score of documentation prose
  answer: B
  docs_urls:
    - "https://mila-iqia.github.io/docmetrics"

