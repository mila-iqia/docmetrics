name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-suffix: "3.14"
      - name: Pin python-version 3.14
        run: uv python pin 3.14
      - name: Install dependencies
        run: uv sync --frozen
      - name: Test with pytest
        run: uv run pytest

  docmetrics:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Run docmetrics (test:dummy — no API key needed)
        uses: ./
        with:
          questions-file: sample_questions.yaml
          model: test:dummy
