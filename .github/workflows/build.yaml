# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: write

# https://stackoverflow.com/a/72408109/6388696
# https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-concurrency-to-cancel-any-in-progress-job-or-run
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linting:
    name: Run linting/pre-commit checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          # https://github.com/astral-sh/setup-uv?tab=readme-ov-file#github-authentication-token
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-suffix: "3.14"
      - run: uvx --python=3.13 pre-commit run --all-files --show-diff-on-failure

  check_docs:
    needs: [linting]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          # https://github.com/astral-sh/setup-uv?tab=readme-ov-file#github-authentication-token
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-suffix: "3.14"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Build the documentation (strict mode)
        run: uv run mkdocs build --strict

  unit_tests:
    needs: [linting]
    runs-on: ${{ matrix.platform }}
    strategy:
      max-parallel: 4
      matrix:
        platform: ["ubuntu-latest", "macos-latest"]
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v6
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          # https://github.com/astral-sh/setup-uv?tab=readme-ov-file#github-authentication-token
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-suffix: ${{ matrix.python-version }}
      - name: Pin python-version ${{ matrix.python-version }}
        run: uv python pin ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --frozen
      - name: Test with pytest
        run: uv run pytest -v --cov=docmetrics --cov-report=xml --cov-append
      - name: Store coverage report as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-unit-tests-${{ matrix.platform }}-${{ matrix.python-version }}
          path: ./coverage.xml

  test-action:
    name: Test the DocMetrics action
    needs: [unit_tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run DocMetrics action
        uses: ./
        with:
          questions-file: sample_questions.yaml
          docs-url: https://mila-iqia.github.io/docmetrics # not used
          model: test:dummy

  test-docmetrics-docs:
    name: Test DocMetrics docs with the action
    runs-on: self-hosted
    needs: [test-action]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-suffix: "3.14"

      - name: Pin Python version
        run: uv python pin 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build PR documentation
        run: uv run mkdocs build

      - name: Serve PR docs in background
        run: |
          cd site
          python -m http.server 8000 &
          echo $! > /tmp/docs_server.pid
          cd ..

      - name: Wait for docs server to be ready
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:8000/ > /dev/null; then
              echo "Docs server is ready"
              exit 0
            fi
            echo "Waiting for docs server... attempt $i"
            sleep 1
          done
          echo "Docs server failed to start"
          exit 1

      - name: Run DocMetrics action on docmetrics docs
        uses: ./
        with:
          questions-file: sample_questions.yaml
          docs-url: http://localhost:8000
          base-docs-url: https://mila-iqia.github.io/docmetrics
          model: ollama:gpt-oss:120b
          ollama-url: http://dgx:11434
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop docs server
        if: always()
        run: |
          if [ -f /tmp/docs_server.pid ]; then
            kill $(cat /tmp/docs_server.pid) || true
          fi

  # https://about.codecov.io/blog/uploading-code-coverage-in-a-separate-job-on-github-actions/
  upload-coverage-codecov:
    needs: [unit_tests]
    runs-on: ubuntu-latest
    name: Upload coverage reports to Codecov
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: coverage-reports-*
          merge-multiple: false
          # download all the artifacts in this directory (each .coverage.xml will be in a subdirectory)
          # Next step if this doesn't work would be to give the coverage files a unique name and use merge-multiple: true
          path: coverage_reports
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage_reports
          fail_ci_if_error: true
