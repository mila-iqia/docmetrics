name: Test Action

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-action:
    name: Test the DocMetrics action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run DocMetrics action
        uses: ./
        with:
          questions-file: sample_questions.yaml
          model: test:dummy
