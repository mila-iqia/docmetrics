name: DocMetrics
description: >
  Evaluate documentation quality and post a score comparison comment on pull requests.

inputs:
  questions-file:
    description: >
      Path to the questions YAML file, relative to the caller's repository root.
    required: true
  model:
    description: LLM model to use.
    required: false
    default: gemini-2.5-flash
  docs-url:
    description: >
      Space-separated list of documentation URLs to use as context for all questions.
    required: false
  base-docs-url:
    description: >
      Documentation URL to use for base branch comparison. Defaults to docs-url if not provided.
    required: false
  gemini-api-key:
    description: >
      Google Gemini API key. Required for Gemini models; omit when using
      'test:dummy' or non-Gemini models.
    required: false
  ollama-url:
    description: >
      Base URL of the Ollama server. Only used with 'ollama:' models.
    required: false
    default: http://localhost:11434
  github-token:
    description: GitHub token used to post the PR comment.
    required: false
    default: ${{ github.token }}
  num-candidates:
    description: >
      Number of times to ask each question and average the results. Higher values
      reduce variance at the cost of more LLM calls. When > 1, the PR comment
      shows a ± std deviation alongside each score.
    required: false
    default: '1'
  post-comment:
    description: >
      Whether to post a PR comment with the results. Set to 'false' when using
      the workflow_run pattern for fork PRs — upload the docmetrics-* workspace
      files as an artifact instead, then call the post-pr-comment reusable
      workflow from a workflow_run trigger.
    required: false
    default: 'true'

outputs:
  score-with-docs:
    description: Score when documentation URLs are provided as context (0.0-1.0).
    value: ${{ steps.parse-outputs.outputs.score-with-docs }}
  score-without-docs:
    description: Score when no documentation context is provided (0.0-1.0).
    value: ${{ steps.parse-outputs.outputs.score-without-docs }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install docmetrics
      shell: bash
      run: pip install --force-reinstall "${{ github.action_path }}"

    - name: Run docmetrics on current branch
      id: run-current
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
      run: |
        python -m docmetrics \
          --questions "${{ github.workspace }}/${{ inputs.questions-file }}" \
          --model "${{ inputs.model }}" \
          --ollama-url "${{ inputs.ollama-url }}" \
          ${{ inputs.docs-url && format('--docs-url {0}', inputs.docs-url) || '' }} \
          --num-candidates "${{ inputs.num-candidates }}" \
          --output-format json \
          | tee /tmp/docmetrics-current.json

    - name: Prepare base branch comparison
      id: prep-base
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        git fetch origin "${{ github.base_ref }}" --depth=1

        if git show "origin/${{ github.base_ref }}:${{ inputs.questions-file }}" \
            > /tmp/base-questions.yaml 2>/dev/null; then
          BASE_HASH=$(sha256sum /tmp/base-questions.yaml | cut -d' ' -f1)
          # Sanitize the ref so it is safe to use as a cache key component.
          BASE_REF_SAFE=$(echo "${{ github.base_ref }}" | tr '/' '-')
          echo "cache-key=docmetrics-${BASE_REF_SAFE}-${BASE_HASH}-${{ inputs.model }}-nc${{ inputs.num-candidates }}" \
            >> "$GITHUB_OUTPUT"
          echo "has-base-questions=true" >> "$GITHUB_OUTPUT"
        else
          echo "Questions file not found on base branch; skipping comparison." >&2
          echo "has-base-questions=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Restore base branch cache
      id: cache-restore
      if: github.event_name == 'pull_request' && steps.prep-base.outputs.has-base-questions == 'true'
      uses: actions/cache/restore@v4
      with:
        path: /tmp/docmetrics-base.json
        key: ${{ steps.prep-base.outputs.cache-key }}

    - name: Run docmetrics on base branch (cache miss)
      if: >-
        github.event_name == 'pull_request' &&
        steps.prep-base.outputs.has-base-questions == 'true' &&
        steps.cache-restore.outputs.cache-hit != 'true'
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
      run: |
        python -m docmetrics \
          --questions /tmp/base-questions.yaml \
          --model "${{ inputs.model }}" \
          --ollama-url "${{ inputs.ollama-url }}" \
          ${{ inputs.base-docs-url && format('--docs-url {0}', inputs.base-docs-url) || (inputs.docs-url && format('--docs-url {0}', inputs.docs-url) || '') }} \
          --num-candidates "${{ inputs.num-candidates }}" \
          --output-format json \
          | tee /tmp/docmetrics-base.json

    - name: Save base branch cache
      if: >-
        github.event_name == 'pull_request' &&
        steps.prep-base.outputs.has-base-questions == 'true' &&
        steps.cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: /tmp/docmetrics-base.json
        key: ${{ steps.prep-base.outputs.cache-key }}

    - name: Parse step outputs
      id: parse-outputs
      shell: bash
      run: |
        python3 - <<'EOF'
        import json, os
        with open("/tmp/docmetrics-current.json") as f:
            d = json.load(f)
        with open(os.environ["GITHUB_OUTPUT"], "a") as out:
            out.write(f"score-with-docs={d['with_docs']['score']}\n")
            out.write(f"score-without-docs={d['without_docs']['score']}\n")
        EOF

    - name: Write PR comment artifacts
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        PR_NUMBER: ${{ github.event.pull_request.number }}
        QUESTIONS_FILE: ${{ inputs.questions-file }}
        MODEL: ${{ inputs.model }}
        BASE_REF: ${{ github.base_ref }}
        CACHE_HIT: ${{ steps.cache-restore.outputs.cache-hit }}
      run: |
        python3 - <<'PYEOF'
        import json, os
        cache_hit = os.environ.get("CACHE_HIT", "") == "true"
        has_base = os.path.exists("/tmp/docmetrics-base.json")
        if cache_hit:
            base_source = "cached"
        elif has_base:
            base_source = "computed"
        else:
            base_source = None
        metadata = {
            "pr_number": int(os.environ["PR_NUMBER"]),
            "base_source": base_source,
            "questions_file": os.environ["QUESTIONS_FILE"],
            "model": os.environ["MODEL"],
            "base_ref": os.environ["BASE_REF"],
        }
        workspace = os.environ["GITHUB_WORKSPACE"]
        with open(os.path.join(workspace, "docmetrics-metadata.json"), "w") as f:
            json.dump(metadata, f)
        PYEOF

        cp /tmp/docmetrics-current.json "$GITHUB_WORKSPACE/docmetrics-current.json"
        if [ -f /tmp/docmetrics-base.json ]; then
          cp /tmp/docmetrics-base.json "$GITHUB_WORKSPACE/docmetrics-base.json"
        fi
        cp "${{ github.action_path }}/.github/scripts/format_comment.py" \
           "$GITHUB_WORKSPACE/docmetrics-format_comment.py"

    - name: Post PR comment
      if: github.event_name == 'pull_request' && inputs.post-comment == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        BASE_ARGS=""
        if [ -f /tmp/docmetrics-base.json ]; then
          BASE_ARGS="--base /tmp/docmetrics-base.json"
          if [ "${{ steps.cache-restore.outputs.cache-hit }}" == "true" ]; then
            BASE_ARGS="$BASE_ARGS --base-source cached"
          else
            BASE_ARGS="$BASE_ARGS --base-source computed"
          fi
        fi

        python3 "${{ github.action_path }}/.github/scripts/format_comment.py" \
          --current /tmp/docmetrics-current.json \
          $BASE_ARGS \
          --questions-file "${{ inputs.questions-file }}" \
          --model "${{ inputs.model }}" \
          --base-ref "${{ github.base_ref }}" \
          > /tmp/docmetrics-comment.md

        PR_NUMBER="${{ github.event.pull_request.number }}"
        REPO="${{ github.repository }}"

        # Update existing comment if one exists (identified by the <!-- docmetrics --> marker),
        # otherwise create a new one.
        EXISTING_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
          --jq '.[] | select(.body | contains("<!-- docmetrics -->")) | .id' \
          | head -1)

        if [ -n "$EXISTING_ID" ]; then
          gh api --method PATCH \
            "repos/$REPO/issues/comments/$EXISTING_ID" \
            -f body="$(cat /tmp/docmetrics-comment.md)"
        else
          gh api --method POST \
            "repos/$REPO/issues/$PR_NUMBER/comments" \
            -f body="$(cat /tmp/docmetrics-comment.md)"
        fi
