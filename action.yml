name: DocMetrics
description: >
  Evaluate documentation usefulness by scoring an LLM quiz three ways — no docs,
  with the base docs, and with the proposed PR docs — and post the comparison
  as a PR comment.

inputs:
  questions-file:
    description: >
      Path to the questions YAML file, relative to the caller's repository root.
    required: true
  model:
    description: LLM model to use.
    required: false
    default: gemini-2.5-flash
  docs-url:
    description: >
      Space-separated list of documentation URLs for the proposed (PR) docs.
    required: true
  base-docs-url:
    description: >
      Space-separated list of documentation URLs for the base / reference docs
      to compare the PR docs against.
    required: true
  gemini-api-key:
    description: >
      Google Gemini API key. Required for Gemini models; omit when using
      'test:dummy' or non-Gemini models.
    required: false
  ollama-url:
    description: >
      Base URL of the Ollama server. Only used with 'ollama:' models.
    required: false
    default: http://localhost:11434
  github-token:
    description: GitHub token used to post the PR comment.
    required: false
    default: ${{ github.token }}
  num-candidates:
    description: >
      Number of times to ask each question and average the results. Higher values
      reduce variance at the cost of more LLM calls. When > 1, the PR comment
      shows a ± std deviation alongside each score.
    required: false
    default: '1'
  post-comment:
    description: >
      Whether to post a PR comment with the results. Set to 'false' when using
      the workflow_run pattern for fork PRs — upload the docmetrics-* workspace
      files as an artifact instead, then call the post-pr-comment reusable
      workflow from a workflow_run trigger.
    required: false
    default: 'true'

outputs:
  score-without-docs:
    description: Score when no documentation context is provided (0.0-1.0).
    value: ${{ steps.parse-outputs.outputs.score-without-docs }}
  score-with-base-docs:
    description: Score when the `base-docs-url` documentation links are provided as context (0.0-1.0).
    value: ${{ steps.parse-outputs.outputs.score-with-base-docs }}
  score-with-docs:
    description: Score when the `docs-url` documentation links are provided as context (0.0-1.0).
    value: ${{ steps.parse-outputs.outputs.score-with-docs }}

runs:
  using: composite
  steps:
    - name: Set up Python
      if: github.event_name == 'pull_request'
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install docmetrics
      if: github.event_name == 'pull_request'
      shell: bash
      run: pip install --force-reinstall "${{ github.action_path }}"

    - name: Run docmetrics (no docs)
      id: run-without-docs
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
      run: |
        python -m docmetrics \
          "${{ github.workspace }}/${{ inputs.questions-file }}" \
          --model "${{ inputs.model }}" \
          --ollama-url "${{ inputs.ollama-url }}" \
          --num-candidates "${{ inputs.num-candidates }}" \
          --output-format json \
          | tee /tmp/docmetrics-without-docs.json

    - name: Run docmetrics (base docs)
      id: run-with-base-docs
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
      run: |
        python -m docmetrics \
          "${{ github.workspace }}/${{ inputs.questions-file }}" \
          --model "${{ inputs.model }}" \
          --ollama-url "${{ inputs.ollama-url }}" \
          --num-candidates "${{ inputs.num-candidates }}" \
          --output-format json \
          --docs-url ${{ inputs.base-docs-url }} \
          | tee /tmp/docmetrics-with-base-docs.json

    - name: Run docmetrics (PR docs)
      id: run-with-docs
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
      run: |
        python -m docmetrics \
          "${{ github.workspace }}/${{ inputs.questions-file }}" \
          --model "${{ inputs.model }}" \
          --ollama-url "${{ inputs.ollama-url }}" \
          --num-candidates "${{ inputs.num-candidates }}" \
          --output-format json \
          --docs-url ${{ inputs.docs-url }} \
          | tee /tmp/docmetrics-with-docs.json

    - name: Parse step outputs
      id: parse-outputs
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        python3 - <<'EOF'
        import json, os
        for name, path in [
            ("score-without-docs", "/tmp/docmetrics-without-docs.json"),
            ("score-with-base-docs", "/tmp/docmetrics-with-base-docs.json"),
            ("score-with-docs", "/tmp/docmetrics-with-docs.json"),
        ]:
            with open(path) as f:
                data = json.load(f)
            with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                out.write(f"{name}={data['result']['score']}\n")
        EOF

    - name: Write PR comment artifacts
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        PR_NUMBER: ${{ github.event.pull_request.number }}
        QUESTIONS_FILE: ${{ inputs.questions-file }}
        MODEL: ${{ inputs.model }}
      run: |
        python3 - <<'PYEOF'
        import json, os
        metadata = {
            "pr_number": int(os.environ["PR_NUMBER"]),
            "questions_file": os.environ["QUESTIONS_FILE"],
            "model": os.environ["MODEL"],
        }
        workspace = os.environ["GITHUB_WORKSPACE"]
        with open(os.path.join(workspace, "docmetrics-metadata.json"), "w") as f:
            json.dump(metadata, f)
        PYEOF

        cp /tmp/docmetrics-without-docs.json "$GITHUB_WORKSPACE/docmetrics-without-docs.json"
        cp /tmp/docmetrics-with-base-docs.json "$GITHUB_WORKSPACE/docmetrics-with-base-docs.json"
        cp /tmp/docmetrics-with-docs.json "$GITHUB_WORKSPACE/docmetrics-with-docs.json"
        cp "${{ github.action_path }}/.github/scripts/format_comment.py" \
           "$GITHUB_WORKSPACE/docmetrics-format_comment.py"

    - name: Post PR comment
      if: github.event_name == 'pull_request' && inputs.post-comment == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        python3 "${{ github.action_path }}/.github/scripts/format_comment.py" \
          --without-docs /tmp/docmetrics-without-docs.json \
          --with-base-docs /tmp/docmetrics-with-base-docs.json \
          --with-docs /tmp/docmetrics-with-docs.json \
          --questions-file "${{ inputs.questions-file }}" \
          --model "${{ inputs.model }}" \
          > /tmp/docmetrics-comment.md

        PR_NUMBER="${{ github.event.pull_request.number }}"
        REPO="${{ github.repository }}"

        # Update existing comment if one exists (identified by the <!-- docmetrics --> marker),
        # otherwise create a new one.
        EXISTING_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
          --jq '.[] | select(.body | contains("<!-- docmetrics -->")) | .id' \
          | head -1)

        if [ -n "$EXISTING_ID" ]; then
          gh api --method PATCH \
            "repos/$REPO/issues/comments/$EXISTING_ID" \
            -f body="$(cat /tmp/docmetrics-comment.md)"
        else
          gh api --method POST \
            "repos/$REPO/issues/$PR_NUMBER/comments" \
            -f body="$(cat /tmp/docmetrics-comment.md)"
        fi
